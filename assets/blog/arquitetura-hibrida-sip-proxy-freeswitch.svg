<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Arquitetura SIP híbrida</title><desc id="desc">proxy para escala + FreeSWITCH para mídia + SBC para perímetro</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#102b4e"/><stop offset=".55" stop-color="#173d70"/><stop offset="1" stop-color="#6f4cff"/></linearGradient>
  <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef6ff"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#06192f" flood-opacity=".22"/></filter>
  <style>
    .h{font-family:Inter,Arial,sans-serif;font-weight:900;fill:white;letter-spacing:-1px}
    .s{font-family:Inter,Arial,sans-serif;font-weight:600;fill:#dce9ff}
    .t{font-family:Inter,Arial,sans-serif;font-weight:800;fill:#17263d}
    .p{font-family:Inter,Arial,sans-serif;font-weight:600;fill:#4e617c}
    .pill{fill:#fff3e6;stroke:#ffd2a5;stroke-width:2}
    .line{stroke:#8fc8ff;stroke-width:5;fill:none;stroke-linecap:round;stroke-dasharray:10 12}
  </style>
</defs>
<rect width="1200" height="675" fill="url(#bg)"/>
<circle cx="1055" cy="130" r="200" fill="#fff" opacity=".07"/><circle cx="140" cy="600" r="260" fill="#42c6ff" opacity=".10"/>
<text x="70" y="82" font-size="44" class="h">Arquitetura SIP híbrida</text>
<text x="72" y="122" font-size="21" class="s">proxy para escala + FreeSWITCH para mídia + SBC para perímetro</text>

<g transform="translate(58 170)">
<path d="M190 160 C315 80 440 80 565 160 S815 240 940 160" class="line"/>
<path d="M190 300 C350 380 600 380 940 300" class="line" opacity=".55"/>
<g filter="url(#shadow)"><rect x="0" y="80" width="230" height="180" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="24" y="122" font-size="25" class="t">Clientes / peers</text>
<text x="24" y="154" font-size="17" class="p">endpoints, carriers, PBX</text></g><g filter="url(#shadow)"><rect x="300" y="45" width="260" height="230" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="324" y="87" font-size="25" class="t">Proxy SIP</text>
<text x="324" y="119" font-size="17" class="p">Kamailio ou OpenSIPS</text></g><g filter="url(#shadow)"><rect x="650" y="45" width="260" height="230" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="674" y="87" font-size="25" class="t">Media Server</text>
<text x="674" y="119" font-size="17" class="p">FreeSWITCH</text></g><g filter="url(#shadow)"><rect x="965" y="80" width="170" height="180" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="989" y="122" font-size="25" class="t">Apps</text>
<text x="989" y="154" font-size="17" class="p">URA, gravação, CPaaS</text></g>
<text x="326" y="170" font-size="16" class="p">sinalização, registro, roteamento</text>
<text x="675" y="170" font-size="16" class="p">mídia, B2BUA, transcodificação</text>
<rect x="210" y="330" width="735" height="78" rx="26" fill="#eaf7ff" stroke="#9be0ff" stroke-width="2"/>
<text x="250" y="378" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="900" fill="#0d5480">Padrão híbrido: proxy na frente, mídia atrás, SBC na borda</text>
</g>
<text x="70" y="630" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#fff">ZICTEC</text>
<text x="168" y="630" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#dce9ff">consultoria em voz, SIP/SBC e operação STFC</text>
</svg>