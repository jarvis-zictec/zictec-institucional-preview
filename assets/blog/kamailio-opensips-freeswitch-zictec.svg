<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Kamailio, OpenSIPS e FreeSWITCH</title><desc id="desc">três peças diferentes para arquiteturas SIP de produção</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#102b4e"/><stop offset=".55" stop-color="#173d70"/><stop offset="1" stop-color="#6f4cff"/></linearGradient>
  <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef6ff"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#06192f" flood-opacity=".22"/></filter>
  <style>
    .h{font-family:Inter,Arial,sans-serif;font-weight:900;fill:white;letter-spacing:-1px}
    .s{font-family:Inter,Arial,sans-serif;font-weight:600;fill:#dce9ff}
    .t{font-family:Inter,Arial,sans-serif;font-weight:800;fill:#17263d}
    .p{font-family:Inter,Arial,sans-serif;font-weight:600;fill:#4e617c}
    .pill{fill:#fff3e6;stroke:#ffd2a5;stroke-width:2}
    .line{stroke:#8fc8ff;stroke-width:5;fill:none;stroke-linecap:round;stroke-dasharray:10 12}
  </style>
</defs>
<rect width="1200" height="675" fill="url(#bg)"/>
<circle cx="1055" cy="130" r="200" fill="#fff" opacity=".07"/><circle cx="140" cy="600" r="260" fill="#42c6ff" opacity=".10"/>
<text x="70" y="82" font-size="44" class="h">Kamailio, OpenSIPS e FreeSWITCH</text>
<text x="72" y="122" font-size="21" class="s">três peças diferentes para arquiteturas SIP de produção</text>

<g transform="translate(70 165)">
<g filter="url(#shadow)"><rect x="0" y="0" width="320" height="350" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="24" y="42" font-size="25" class="t">Kamailio</text>
<text x="24" y="74" font-size="17" class="p">proxy SIP de alta escala</text></g>
<g filter="url(#shadow)"><rect x="370" y="0" width="320" height="350" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="394" y="42" font-size="25" class="t">OpenSIPS</text>
<text x="394" y="74" font-size="17" class="p">roteamento SIP e integrações</text></g>
<g filter="url(#shadow)"><rect x="740" y="0" width="320" height="350" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="764" y="42" font-size="25" class="t">FreeSWITCH</text>
<text x="764" y="74" font-size="17" class="p">B2BUA e mídia inteligente</text></g>
<text x="26" y="118" font-size="17" class="p">• Registrar / rotear</text><text x="26" y="148" font-size="17" class="p">• Balancear chamadas</text><text x="26" y="178" font-size="17" class="p">• Alta taxa de CPS</text>
<text x="396" y="118" font-size="17" class="p">• Script procedural</text><text x="396" y="148" font-size="17" class="p">• HTTP/REST e controle</text><text x="396" y="178" font-size="17" class="p">• Cluster e dispatcher</text>
<text x="766" y="118" font-size="17" class="p">• Transcodificação</text><text x="766" y="148" font-size="17" class="p">• URA / conferência</text><text x="766" y="178" font-size="17" class="p">• Gravação / WebRTC</text>
<rect x="80" y="255" width="900" height="64" rx="32" fill="#fff3e6" stroke="#ffd2a5" stroke-width="2"/>
<text x="128" y="296" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#8b4400">A pergunta certa não é “qual escolher?”, mas “onde cada peça entra?”</text>
</g>
<text x="70" y="630" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#fff">ZICTEC</text>
<text x="168" y="630" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#dce9ff">consultoria em voz, SIP/SBC e operação STFC</text>
</svg>