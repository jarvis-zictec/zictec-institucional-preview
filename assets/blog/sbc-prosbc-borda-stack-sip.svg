<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">Onde o SBC entra</title><desc id="desc">o perímetro SIP exige funções que o stack DIY raramente cobre por completo</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#102b4e"/><stop offset=".55" stop-color="#173d70"/><stop offset="1" stop-color="#6f4cff"/></linearGradient>
  <linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eef6ff"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#06192f" flood-opacity=".22"/></filter>
  <style>
    .h{font-family:Inter,Arial,sans-serif;font-weight:900;fill:white;letter-spacing:-1px}
    .s{font-family:Inter,Arial,sans-serif;font-weight:600;fill:#dce9ff}
    .t{font-family:Inter,Arial,sans-serif;font-weight:800;fill:#17263d}
    .p{font-family:Inter,Arial,sans-serif;font-weight:600;fill:#4e617c}
    .pill{fill:#fff3e6;stroke:#ffd2a5;stroke-width:2}
    .line{stroke:#8fc8ff;stroke-width:5;fill:none;stroke-linecap:round;stroke-dasharray:10 12}
  </style>
</defs>
<rect width="1200" height="675" fill="url(#bg)"/>
<circle cx="1055" cy="130" r="200" fill="#fff" opacity=".07"/><circle cx="140" cy="600" r="260" fill="#42c6ff" opacity=".10"/>
<text x="70" y="82" font-size="44" class="h">Onde o SBC entra</text>
<text x="72" y="122" font-size="21" class="s">o perímetro SIP exige funções que o stack DIY raramente cobre por completo</text>

<g transform="translate(70 160)">
<g filter="url(#shadow)"><rect x="0" y="125" width="245" height="160" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="24" y="167" font-size="25" class="t">Internet / peers</text>
<text x="24" y="199" font-size="17" class="p">operadoras e clientes</text></g><g filter="url(#shadow)"><rect x="322" y="70" width="300" height="270" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="346" y="112" font-size="25" class="t">SBC / ProSBC</text>
<text x="346" y="144" font-size="17" class="p">borda, segurança e política</text></g><g filter="url(#shadow)"><rect x="700" y="20" width="330" height="130" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="724" y="62" font-size="25" class="t">Kamailio / OpenSIPS</text>
<text x="724" y="94" font-size="17" class="p">roteamento interno</text></g><g filter="url(#shadow)"><rect x="700" y="220" width="330" height="130" rx="24" fill="url(#card)" stroke="#d8e4f0" stroke-width="2"/>
<text x="724" y="262" font-size="25" class="t">FreeSWITCH</text>
<text x="724" y="294" font-size="17" class="p">mídia e aplicações</text></g>
<path d="M250 205 L315 205" stroke="#ffb35c" stroke-width="8" stroke-linecap="round"/><path d="M625 145 L690 90" stroke="#8fc8ff" stroke-width="7" stroke-linecap="round"/><path d="M625 260 L690 290" stroke="#8fc8ff" stroke-width="7" stroke-linecap="round"/>
<text x="358" y="173" font-size="18" class="p">TLS/SRTP, NAT, ACL</text><text x="358" y="206" font-size="18" class="p">limites, rotas, logs</text><text x="358" y="239" font-size="18" class="p">interconexão segura</text>
<rect x="40" y="395" width="990" height="76" rx="25" fill="#fff3e6" stroke="#ffd2a5" stroke-width="2"/>
<text x="84" y="443" font-family="Inter,Arial,sans-serif" font-size="25" font-weight="900" fill="#8b4400">Proxy e B2BUA não substituem o papel de SBC na borda da rede.</text>
</g>
<text x="70" y="630" font-family="Inter,Arial,sans-serif" font-size="24" font-weight="900" fill="#fff">ZICTEC</text>
<text x="168" y="630" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#dce9ff">consultoria em voz, SIP/SBC e operação STFC</text>
</svg>